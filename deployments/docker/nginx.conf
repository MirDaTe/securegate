# Nginx 설정 — SecureGate 리버스 프록시 + TLS 종단 + 단일 포트 진입

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 로그 포맷 (감사 목적 — 클라이언트 IP 보존)
    log_format securegate '$remote_addr - $remote_user [$time_local] '
                          '"$request" $status $body_bytes_sent '
                          '"$http_referer" "$http_user_agent" '
                          '$request_time';

    access_log /var/log/nginx/access.log securegate;
    error_log  /var/log/nginx/error.log warn;

    # 보안 설정
    server_tokens off;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;

    # HTTP → HTTPS 리다이렉트
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS (단일 진입점: 443)
    server {
        listen 443 ssl http2;
        server_name _;

        # TLS 1.3 강제 (1.2 이하 비활성화)
        ssl_protocols TLSv1.3;
        ssl_prefer_server_ciphers off;

        # TLS 인증서 (자체 서명 또는 공인 인증서)
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # 클라이언트 최대 업로드 크기 (파일 전송용)
        client_max_body_size 500M;

        # WebSocket 지원 헤더
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # API 서버로 프록시
        location /api/ {
            proxy_pass http://server:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;  # 장시간 세션 지원
            proxy_send_timeout 3600s;
        }

        # WebSocket
        location /ws/ {
            proxy_pass http://server:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;  # 24시간 세션 지원
            proxy_send_timeout 86400s;
            proxy_buffering off;         # WebSocket: 버퍼링 비활성화
        }

        # React SPA 정적 파일
        location / {
            proxy_pass http://server:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
